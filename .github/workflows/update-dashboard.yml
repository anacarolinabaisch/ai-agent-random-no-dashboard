name: Atualizar Dashboard Semanal

on:
  schedule:
    - cron: '0 12 * * 5'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install databricks-sql-connector

      - name: Rodar script de atualizacao
        env:
          DATABRICKS_HOST: nubank-e2-general.cloud.databricks.com
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_HTTP_PATH: /sql/1.0/warehouses/5697b7d8242e3d90
        run: python update_dashboard.py

      - name: Salvar HTML atualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Dashboard atualizado - $(date '+%d/%m/%Y')"
          git push
